# ════════════════════════════════════════════════════════
#  Mosquitto Configuration — Local MQTT Broker
# ════════════════════════════════════════════════════════

# ─── Listeners ───────────────────────────────────────────
listener 1883
listener 9001
protocol websockets

# ─── Security (Local network — no auth) ──────────────────
allow_anonymous true

# ─── Persistence ─────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/
autosave_interval 60

# ─── Logging ─────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type information
log_timestamp true

# ─── Performance ─────────────────────────────────────────
max_keepalive 120
max_packet_size 102400
max_queued_messages 1000
