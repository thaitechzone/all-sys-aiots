; ============================================================
;  PlatformIO Project — ESP32 SmartFarm MQTT Telemetry
;  Board: ESP32 DevKit v1 (WROOM-32)
;  IDE  : VS Code + PlatformIO Extension
; ============================================================

[platformio]
default_envs = esp32dev

; ────────────────────────────────────────────────────────────
;  Environment: ESP32 DevKit v1 (38-pin / 30-pin)
; ────────────────────────────────────────────────────────────
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Monitor
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time

; Upload
upload_speed = 921600

; Build flags — enable verbose / exception decode
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUHAL_LOG_COLORS=1

; ────────────────────────────────────────────────────────────
;  Dependencies
;   - PubSubClient      : MQTT client
;   - ArduinoJson       : JSON serialization / deserialization
;   - OneWire           : OneWire bus (DS18B20)
;   - DallasTemperature : DS18B20 temperature sensor
; ────────────────────────────────────────────────────────────
lib_deps =
    knolleary/PubSubClient       @ ^2.8.0
    bblanchon/ArduinoJson        @ ^7.0.0
    paulstoffregen/OneWire       @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0

; ────────────────────────────────────────────────────────────
;  Environment: ESP32-S3
; ────────────────────────────────────────────────────────────
[env:esp32s3]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, colorize, time
upload_speed    = 921600
lib_deps =
    knolleary/PubSubClient       @ ^2.8.0
    bblanchon/ArduinoJson        @ ^7.0.0
    paulstoffregen/OneWire       @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
