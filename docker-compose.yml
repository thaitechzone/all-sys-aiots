# ════════════════════════════════════════════════════════════════════════════════
# NodeRED + N8N (SQLite) + Home Assistant + InfluxDB + Grafana
# + Nginx Proxy Manager + Cloudflare Tunnel + MQTT
#
# ตัวแปรที่ต้องใน .env file:
#   TZ                      — Timezone เช่น Asia/Bangkok
#   NODERED_USERNAME        — Node-RED username
#   NODERED_PASSWORD_HASH   — Node-RED password hash
#   INFLUXDB_USERNAME       — InfluxDB admin username
#   INFLUXDB_PASSWORD       — InfluxDB admin password
#   INFLUXDB_ORG            — InfluxDB organization
#   INFLUXDB_BUCKET         — InfluxDB default bucket
#   INFLUXDB_ADMIN_TOKEN    — InfluxDB admin token
#   GRAFANA_ADMIN_USER      — Grafana admin username
#   GRAFANA_ADMIN_PASSWORD  — Grafana admin password
#   N8N_DOMAIN              — N8N domain (e.g., n8n.yourdomain.com)
#   N8N_ENCRYPTION_KEY      — N8N encryption key (32-char hex)
#   CLOUDFLARE_TUNNEL_TOKEN — Cloudflare Tunnel token (optional)
#
# Cloudflare Tunnel Setup:
#   1. เข้า https://one.dash.cloudflare.com → Networks → Tunnels
#   2. สร้าง Tunnel → Copy token ใส่ .env
#   3. เพิ่ม Public Hostname: n8n.yourdomain.com → http://nginx-proxy-manager:80
#   4. Nginx Proxy Manager เพิ่ม Proxy Host: n8n.yourdomain.com → http://n8n:5678
# ════════════════════════════════════════════════════════════════════════════════

services:

  # ════════════════════════════════════════════════════════
  #  Mosquitto — Local MQTT Broker
  #  MQTT : localhost:1883
  #  WS   : localhost:9001
  # ════════════════════════════════════════════════════════
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ════════════════════════════════════════════════════════
  #  InfluxDB — Time-Series Database
  #  UI  : http://localhost:8086
  #  เชื่อมจาก container: http://influxdb:8086
  #
  #  ORG / BUCKET / TOKEN: init อัตโนมัติจาก .env (ไม่ต้องตั้งใน UI)
  #  ⚠️ ค่าเหล่านี้ init เฉพาะตอน volume ว่าง (ครั้งแรก) เท่านั้น
  #     ถ้าเคยรันแล้วต้องแก้ ให้ล้าง volume: docker compose down -v
  #  ดู: README.md (Step 5)
  # ════════════════════════════════════════════════════════
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      - TZ=${TZ}
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_USERNAME}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_PASSWORD}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_ADMIN_TOKEN}
    restart: unless-stopped
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ════════════════════════════════════════════════════════
  #  Node-RED — Flow-based IoT Automation
  #  UI : http://localhost:1880
  #  Login: ${NODERED_USERNAME}
  # ════════════════════════════════════════════════════════
  nodered:
    image: nodered/node-red:latest
    container_name: nodered
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
      - ./nodered/settings.js:/data/settings.js
      - ./nodered/package.json:/data/package.json
    environment:
      - TZ=${TZ}
      - NODERED_USERNAME=${NODERED_USERNAME}
      - NODERED_PASSWORD_HASH=${NODERED_PASSWORD_HASH}
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=${INFLUXDB_ADMIN_TOKEN}
      - INFLUXDB_ORG=${INFLUXDB_ORG}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET}
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    networks:
      - iot_network

  # ════════════════════════════════════════════════════════
  #  N8N — Workflow Automation (SQLite)
  #  UI      : http://localhost:5678
  #  Public  : https://${N8N_DOMAIN}  (ผ่าน Cloudflare Tunnel)
  # ════════════════════════════════════════════════════════
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - TZ=${TZ}
      - GENERIC_TIMEZONE=${TZ}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://${N8N_DOMAIN}/
      - N8N_EDITOR_BASE_URL=https://${N8N_DOMAIN}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_METRICS=false
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - DB_TYPE=sqlite
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - iot_network

  # ════════════════════════════════════════════════════════
  #  Home Assistant — Home Automation
  #  UI : http://localhost:8123
  # ════════════════════════════════════════════════════════
  homeassistant:
    image: homeassistant/home-assistant:stable
    container_name: homeassistant
    ports:
      - "8123:8123"
    volumes:
      - homeassistant_config:/config
    environment:
      - TZ=${TZ}
    privileged: true
    restart: unless-stopped
    networks:
      - iot_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8123 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ════════════════════════════════════════════════════════
  #  Grafana — Data Visualization Dashboard
  #  UI : http://localhost:3000
  #  Default login: admin / (GRAFANA_ADMIN_PASSWORD)
  #
  #  InfluxDB DataSource: ตั้งเอง ผ่าน Grafana UI
  #  ดู: README.md (Step 5)
  # ════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - TZ=${TZ}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
      - GF_SERVER_ROOT_URL=http://localhost:3000
    restart: unless-stopped
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - iot_network

  # ════════════════════════════════════════════════════════
  #  Nginx Proxy Manager — Reverse Proxy + SSL
  #  Admin UI : http://localhost:81
  #  HTTP     : port 80
  #  HTTPS    : port 443
  #  Default login: admin@example.com / changeme
  # ════════════════════════════════════════════════════════
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - iot_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ════════════════════════════════════════════════════════
  #  Cloudflare Tunnel — เชื่อม N8N ออก Internet
  #
  #  Setup:
  #  1. https://one.dash.cloudflare.com → Networks → Tunnels
  #  2. สร้าง Tunnel → copy token → ใส่ใน .env
  #  3. เพิ่ม Public Hostname:
  #     n8n.yourdomain.com → http://nginx-proxy-manager:80
  #  4. ใน Nginx Proxy Manager เพิ่ม Proxy Host:
  #     n8n.yourdomain.com → http://n8n:5678
  # ════════════════════════════════════════════════════════
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      nginx-proxy-manager:
        condition: service_healthy
    networks:
      - iot_network

# ════════════════════════════════════════════════════════
#  Networks & Volumes
# ════════════════════════════════════════════════════════
networks:
  iot_network:
    driver: bridge

volumes:
  mosquitto_data:
  mosquitto_log:
  influxdb_data:
  influxdb_config:
  nodered_data:
  n8n_data:
  homeassistant_config:
  grafana_data:
  npm_data:
  npm_letsencrypt:
